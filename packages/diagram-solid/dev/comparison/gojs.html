<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoJS Style — Organization Chart</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1b26;
      min-height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
    }

    .page-header {
      width: 100%;
      padding: 36px 0 0 0;
      text-align: center;
    }

    .page-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6272a4;
    }

    .page-subtitle {
      margin-top: 8px;
      font-size: 28px;
      font-weight: 700;
      color: #cdd6f4;
      letter-spacing: -0.02em;
    }

    .page-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 4px 12px;
      border-radius: 99px;
      background: rgba(98, 114, 164, 0.15);
      border: 1px solid rgba(98, 114, 164, 0.3);
      font-size: 11px;
      color: #6272a4;
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .diagram-card {
      margin: 40px auto 60px;
      background: #16161e;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 40px 80px rgba(0,0,0,0.6),
        0 20px 40px rgba(0,0,0,0.4);
      padding: 40px 48px 48px;
      width: calc(100vw - 80px);
      max-width: 1240px;
      overflow: hidden;
    }

    .diagram-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .diagram-card-title {
      font-size: 14px;
      font-weight: 600;
      color: #cdd6f4;
      letter-spacing: 0.01em;
    }

    .diagram-card-meta {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot-red   { background: #ff5f57; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green  { background: #28ca41; }

    .diagram-svg-wrapper {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    svg {
      overflow: visible;
      width: 100%;
      max-width: 1100px;
      height: auto;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="page-title">Component Showcase</div>
    <div class="page-subtitle">GoJS Style</div>
    <div class="page-badge">
      <svg width="8" height="8" viewBox="0 0 8 8" fill="none">
        <circle cx="4" cy="4" r="4" fill="#50fa7b"/>
      </svg>
      Static SVG · GoJS Visual Language
    </div>
  </div>

  <div class="diagram-card">
    <div class="diagram-card-header">
      <div class="diagram-card-title">Organization Chart</div>
      <div class="diagram-card-meta">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
      </div>
    </div>

    <div class="diagram-svg-wrapper">
      <!--
        Layout (px coords in SVG viewBox 0 0 1100 820):
        CEO:             x=425, y=30      w=250, h=80
        CTO:             x=100, y=200     w=210, h=80
        CFO:             x=445, y=200     w=210, h=80
        CMO:             x=790, y=200     w=210, h=80
        VP Engineering:  x=30,  y=390     w=200, h=80
        VP Product:      x=255, y=390     w=200, h=80
        VP Finance:      x=445, y=390     w=200, h=80
        Team Lead A:     x=30,  y=580     w=200, h=80
        Team Lead B:     x=255, y=580     w=200, h=80
      -->
      <svg viewBox="0 0 1100 740" xmlns="http://www.w3.org/2000/svg">
        <defs>

          <!-- Drop shadows -->
          <filter id="shadow-node" x="-20%" y="-20%" width="160%" height="160%">
            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
            <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.3"/>
          </filter>

          <filter id="shadow-edge-label" x="-30%" y="-60%" width="160%" height="220%">
            <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
          </filter>

          <!-- CEO (amber/gold) gradients -->
          <linearGradient id="grad-ceo-header" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#f59e0b"/>
            <stop offset="100%" stop-color="#d97706"/>
          </linearGradient>
          <linearGradient id="grad-ceo-body" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#fffbf0"/>
            <stop offset="100%" stop-color="#fef3c7"/>
          </linearGradient>

          <!-- CTO / VP Eng / VP Prod / Team Lead (blue) gradients -->
          <linearGradient id="grad-blue-header" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#2563eb"/>
          </linearGradient>
          <linearGradient id="grad-blue-body" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#f8faff"/>
            <stop offset="100%" stop-color="#eff6ff"/>
          </linearGradient>

          <!-- Team Lead light blue -->
          <linearGradient id="grad-lightblue-header" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#60a5fa"/>
            <stop offset="100%" stop-color="#3b82f6"/>
          </linearGradient>

          <!-- CFO / VP Finance (green) gradients -->
          <linearGradient id="grad-green-header" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#22c55e"/>
            <stop offset="100%" stop-color="#16a34a"/>
          </linearGradient>
          <linearGradient id="grad-green-body" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#f0fdf4"/>
            <stop offset="100%" stop-color="#dcfce7"/>
          </linearGradient>

          <!-- CMO (purple) gradients -->
          <linearGradient id="grad-purple-header" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#a855f7"/>
            <stop offset="100%" stop-color="#9333ea"/>
          </linearGradient>
          <linearGradient id="grad-purple-body" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#faf5ff"/>
            <stop offset="100%" stop-color="#f3e8ff"/>
          </linearGradient>

          <!-- Arrow marker (dark gray) -->
          <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
          </marker>

          <!-- Arrow marker for blue edges -->
          <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
          </marker>

        </defs>

        <!-- ═══════════════════════════════════════════
             EDGES (drawn first so nodes appear on top)
             ═══════════════════════════════════════════ -->

        <!-- CEO → CTO: CEO bottom-center (550,110) → CTO top-center (205,200) -->
        <!-- Orthogonal: down to midpoint y=155, then left to CTO cx, then down -->
        <path d="M550,110 L550,155 L205,155 L205,200"
              fill="none" stroke="#64748b" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"
              marker-end="url(#arrow)"
              stroke-dasharray="none"/>

        <!-- CEO → CFO: CEO bottom-center (550,110) → CFO top-center (550,200) straight down -->
        <path d="M550,110 L550,200"
              fill="none" stroke="#64748b" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"
              marker-end="url(#arrow)"/>

        <!-- CEO → CMO: CEO bottom-center (550,110) → CMO top-center (895,200) -->
        <path d="M550,110 L550,155 L895,155 L895,200"
              fill="none" stroke="#64748b" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"
              marker-end="url(#arrow)"/>

        <!-- CTO → VP Engineering: CTO bottom-center (205,280) → VP Eng top-center (130,390) -->
        <path d="M205,280 L205,335 L130,335 L130,390"
              fill="none" stroke="#64748b" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round"
              marker-end="url(#arrow)"/>

        <!-- CTO → VP Product: CTO bottom-center (205,280) → VP Prod top-center (355,390) -->
        <path d="M205,280 L205,335 L355,335 L355,390"
              fill="none" stroke="#64748b" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round"
              marker-end="url(#arrow)"/>

        <!-- CFO → VP Finance: CFO bottom-center (550,280) → VP Fin top-center (545,390) straight -->
        <path d="M550,280 L550,390"
              fill="none" stroke="#64748b" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round"
              marker-end="url(#arrow)"/>

        <!-- VP Eng → Team Lead A: VP Eng bottom-center (130,470) → Team Lead A top-center (130,580) -->
        <path d="M130,470 L130,580"
              fill="none" stroke="#94a3b8" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"
              marker-end="url(#arrow-blue)"/>

        <!-- VP Eng → Team Lead B: VP Eng bottom-center (130,470) → Team Lead B top-center (355,580) -->
        <path d="M130,470 L130,525 L355,525 L355,580"
              fill="none" stroke="#94a3b8" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round"
              marker-end="url(#arrow-blue)"/>

        <!-- ═══════════════════════════════════════════
             NODES
             ═══════════════════════════════════════════ -->

        <!-- ─── CEO (center top): x=425, y=30, w=250, h=80 ─── -->
        <g filter="url(#shadow-node)" transform="translate(425,30)">
          <!-- outer border -->
          <rect width="250" height="80" rx="9" ry="9" fill="#e2a805" opacity="0.35"/>
          <!-- body -->
          <rect x="1" y="1" width="248" height="78" rx="8" ry="8" fill="url(#grad-ceo-body)"/>
          <!-- header bar -->
          <clipPath id="clip-ceo">
            <rect x="1" y="1" width="248" height="28" rx="8" ry="8"/>
            <!-- cover bottom rounded corners of header -->
            <rect x="1" y="18" width="248" height="12"/>
          </clipPath>
          <rect x="1" y="1" width="248" height="30" fill="url(#grad-ceo-header)" clip-path="url(#clip-ceo)"/>
          <!-- header bottom separator -->
          <line x1="1" y1="31" x2="249" y2="31" stroke="#d97706" stroke-width="0.5" opacity="0.6"/>
          <!-- header icon: star -->
          <text x="14" y="22" font-size="13" fill="rgba(255,255,255,0.9)" font-family="system-ui">★</text>
          <!-- header title -->
          <text x="34" y="22" font-size="11.5" font-weight="700" fill="#ffffff" font-family="system-ui" letter-spacing="0.04em">CHIEF EXECUTIVE OFFICER</text>
          <!-- person name -->
          <text x="125" y="55" font-size="13.5" font-weight="600" fill="#1c1917" font-family="system-ui" text-anchor="middle">Alexandra Chen</text>
          <!-- role short -->
          <text x="125" y="70" font-size="10.5" fill="#78716c" font-family="system-ui" text-anchor="middle" letter-spacing="0.02em">CEO · Founded 2018</text>
        </g>

        <!-- ─── CTO (left): x=100, y=200, w=210, h=80 ─── -->
        <g filter="url(#shadow-node)" transform="translate(100,200)">
          <rect width="210" height="80" rx="9" ry="9" fill="#1d4ed8" opacity="0.35"/>
          <rect x="1" y="1" width="208" height="78" rx="8" ry="8" fill="url(#grad-blue-body)"/>
          <clipPath id="clip-cto">
            <rect x="1" y="1" width="208" height="28" rx="8" ry="8"/>
            <rect x="1" y="18" width="208" height="12"/>
          </clipPath>
          <rect x="1" y="1" width="208" height="30" fill="url(#grad-blue-header)" clip-path="url(#clip-cto)"/>
          <line x1="1" y1="31" x2="209" y2="31" stroke="#1d4ed8" stroke-width="0.5" opacity="0.5"/>
          <text x="12" y="22" font-size="12" fill="rgba(255,255,255,0.9)" font-family="system-ui">⚙</text>
          <text x="30" y="22" font-size="11" font-weight="700" fill="#ffffff" font-family="system-ui" letter-spacing="0.04em">CHIEF TECHNOLOGY</text>
          <text x="105" y="55" font-size="13.5" font-weight="600" fill="#1e3a5f" font-family="system-ui" text-anchor="middle">Marcus Rivera</text>
          <text x="105" y="70" font-size="10.5" fill="#64748b" font-family="system-ui" text-anchor="middle">CTO · 12 yrs experience</text>
        </g>

        <!-- ─── CFO (center): x=445, y=200, w=210, h=80 ─── -->
        <g filter="url(#shadow-node)" transform="translate(445,200)">
          <rect width="210" height="80" rx="9" ry="9" fill="#15803d" opacity="0.35"/>
          <rect x="1" y="1" width="208" height="78" rx="8" ry="8" fill="url(#grad-green-body)"/>
          <clipPath id="clip-cfo">
            <rect x="1" y="1" width="208" height="28" rx="8" ry="8"/>
            <rect x="1" y="18" width="208" height="12"/>
          </clipPath>
          <rect x="1" y="1" width="208" height="30" fill="url(#grad-green-header)" clip-path="url(#clip-cfo)"/>
          <line x1="1" y1="31" x2="209" y2="31" stroke="#15803d" stroke-width="0.5" opacity="0.5"/>
          <text x="12" y="22" font-size="12" fill="rgba(255,255,255,0.9)" font-family="system-ui">$</text>
          <text x="30" y="22" font-size="11" font-weight="700" fill="#ffffff" font-family="system-ui" letter-spacing="0.04em">CHIEF FINANCIAL</text>
          <text x="105" y="55" font-size="13.5" font-weight="600" fill="#14532d" font-family="system-ui" text-anchor="middle">Priya Sharma</text>
          <text x="105" y="70" font-size="10.5" fill="#4b7a5c" font-family="system-ui" text-anchor="middle">CFO · MBA Harvard</text>
        </g>

        <!-- ─── CMO (right): x=790, y=200, w=210, h=80 ─── -->
        <g filter="url(#shadow-node)" transform="translate(790,200)">
          <rect width="210" height="80" rx="9" ry="9" fill="#7c3aed" opacity="0.35"/>
          <rect x="1" y="1" width="208" height="78" rx="8" ry="8" fill="url(#grad-purple-body)"/>
          <clipPath id="clip-cmo">
            <rect x="1" y="1" width="208" height="28" rx="8" ry="8"/>
            <rect x="1" y="18" width="208" height="12"/>
          </clipPath>
          <rect x="1" y="1" width="208" height="30" fill="url(#grad-purple-header)" clip-path="url(#clip-cmo)"/>
          <line x1="1" y1="31" x2="209" y2="31" stroke="#7c3aed" stroke-width="0.5" opacity="0.5"/>
          <text x="12" y="22" font-size="12" fill="rgba(255,255,255,0.9)" font-family="system-ui">◈</text>
          <text x="30" y="22" font-size="11" font-weight="700" fill="#ffffff" font-family="system-ui" letter-spacing="0.04em">CHIEF MARKETING</text>
          <text x="105" y="55" font-size="13.5" font-weight="600" fill="#3b0764" font-family="system-ui" text-anchor="middle">Sophie Laurent</text>
          <text x="105" y="70" font-size="10.5" fill="#7c6fa0" font-family="system-ui" text-anchor="middle">CMO · Brand Strategy</text>
        </g>

        <!-- ─── VP Engineering: x=30, y=390, w=200, h=80 ─── -->
        <g filter="url(#shadow-node)" transform="translate(30,390)">
          <rect width="200" height="80" rx="9" ry="9" fill="#1d4ed8" opacity="0.3"/>
          <rect x="1" y="1" width="198" height="78" rx="8" ry="8" fill="url(#grad-blue-body)"/>
          <clipPath id="clip-vpe">
            <rect x="1" y="1" width="198" height="28" rx="8" ry="8"/>
            <rect x="1" y="18" width="198" height="12"/>
          </clipPath>
          <rect x="1" y="1" width="198" height="30" fill="url(#grad-blue-header)" clip-path="url(#clip-vpe)"/>
          <line x1="1" y1="31" x2="199" y2="31" stroke="#1d4ed8" stroke-width="0.5" opacity="0.5"/>
          <text x="10" y="22" font-size="11" fill="rgba(255,255,255,0.85)" font-family="system-ui">▸</text>
          <text x="26" y="22" font-size="10.5" font-weight="700" fill="#ffffff" font-family="system-ui" letter-spacing="0.04em">VP ENGINEERING</text>
          <text x="100" y="55" font-size="13" font-weight="600" fill="#1e3a5f" font-family="system-ui" text-anchor="middle">James Okafor</text>
          <text x="100" y="70" font-size="10" fill="#64748b" font-family="system-ui" text-anchor="middle">VP Eng · 80 reports</text>
        </g>

        <!-- ─── VP Product: x=255, y=390, w=200, h=80 ─── -->
        <g filter="url(#shadow-node)" transform="translate(255,390)">
          <rect width="200" height="80" rx="9" ry="9" fill="#1d4ed8" opacity="0.3"/>
          <rect x="1" y="1" width="198" height="78" rx="8" ry="8" fill="url(#grad-blue-body)"/>
          <clipPath id="clip-vpp">
            <rect x="1" y="1" width="198" height="28" rx="8" ry="8"/>
            <rect x="1" y="18" width="198" height="12"/>
          </clipPath>
          <rect x="1" y="1" width="198" height="30" fill="url(#grad-blue-header)" clip-path="url(#clip-vpp)"/>
          <line x1="1" y1="31" x2="199" y2="31" stroke="#1d4ed8" stroke-width="0.5" opacity="0.5"/>
          <text x="10" y="22" font-size="11" fill="rgba(255,255,255,0.85)" font-family="system-ui">◆</text>
          <text x="26" y="22" font-size="10.5" font-weight="700" fill="#ffffff" font-family="system-ui" letter-spacing="0.04em">VP PRODUCT</text>
          <text x="100" y="55" font-size="13" font-weight="600" fill="#1e3a5f" font-family="system-ui" text-anchor="middle">Yuna Kim</text>
          <text x="100" y="70" font-size="10" fill="#64748b" font-family="system-ui" text-anchor="middle">VP Product · 3 PMs</text>
        </g>

        <!-- ─── VP Finance: x=445, y=390, w=200, h=80 ─── -->
        <g filter="url(#shadow-node)" transform="translate(445,390)">
          <rect width="200" height="80" rx="9" ry="9" fill="#15803d" opacity="0.3"/>
          <rect x="1" y="1" width="198" height="78" rx="8" ry="8" fill="url(#grad-green-body)"/>
          <clipPath id="clip-vpf">
            <rect x="1" y="1" width="198" height="28" rx="8" ry="8"/>
            <rect x="1" y="18" width="198" height="12"/>
          </clipPath>
          <rect x="1" y="1" width="198" height="30" fill="url(#grad-green-header)" clip-path="url(#clip-vpf)"/>
          <line x1="1" y1="31" x2="199" y2="31" stroke="#15803d" stroke-width="0.5" opacity="0.5"/>
          <text x="10" y="22" font-size="11" fill="rgba(255,255,255,0.85)" font-family="system-ui">▲</text>
          <text x="26" y="22" font-size="10.5" font-weight="700" fill="#ffffff" font-family="system-ui" letter-spacing="0.04em">VP FINANCE</text>
          <text x="100" y="55" font-size="13" font-weight="600" fill="#14532d" font-family="system-ui" text-anchor="middle">Elena Vasquez</text>
          <text x="100" y="70" font-size="10" fill="#4b7a5c" font-family="system-ui" text-anchor="middle">VP Finance · FP&amp;A</text>
        </g>

        <!-- ─── Team Lead A: x=30, y=580, w=200, h=80 ─── -->
        <g filter="url(#shadow-node)" transform="translate(30,580)">
          <rect width="200" height="80" rx="9" ry="9" fill="#2563eb" opacity="0.25"/>
          <rect x="1" y="1" width="198" height="78" rx="8" ry="8" fill="url(#grad-blue-body)"/>
          <clipPath id="clip-tla">
            <rect x="1" y="1" width="198" height="28" rx="8" ry="8"/>
            <rect x="1" y="18" width="198" height="12"/>
          </clipPath>
          <rect x="1" y="1" width="198" height="30" fill="url(#grad-lightblue-header)" clip-path="url(#clip-tla)"/>
          <line x1="1" y1="31" x2="199" y2="31" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
          <text x="10" y="22" font-size="11" fill="rgba(255,255,255,0.85)" font-family="system-ui">●</text>
          <text x="26" y="22" font-size="10.5" font-weight="700" fill="#ffffff" font-family="system-ui" letter-spacing="0.04em">TEAM LEAD A</text>
          <text x="100" y="55" font-size="13" font-weight="600" fill="#1e3a5f" font-family="system-ui" text-anchor="middle">David Park</text>
          <text x="100" y="70" font-size="10" fill="#64748b" font-family="system-ui" text-anchor="middle">Backend · 8 devs</text>
        </g>

        <!-- ─── Team Lead B: x=255, y=580, w=200, h=80 ─── -->
        <g filter="url(#shadow-node)" transform="translate(255,580)">
          <rect width="200" height="80" rx="9" ry="9" fill="#2563eb" opacity="0.25"/>
          <rect x="1" y="1" width="198" height="78" rx="8" ry="8" fill="url(#grad-blue-body)"/>
          <clipPath id="clip-tlb">
            <rect x="1" y="1" width="198" height="28" rx="8" ry="8"/>
            <rect x="1" y="18" width="198" height="12"/>
          </clipPath>
          <rect x="1" y="1" width="198" height="30" fill="url(#grad-lightblue-header)" clip-path="url(#clip-tlb)"/>
          <line x1="1" y1="31" x2="199" y2="31" stroke="#3b82f6" stroke-width="0.5" opacity="0.4"/>
          <text x="10" y="22" font-size="11" fill="rgba(255,255,255,0.85)" font-family="system-ui">●</text>
          <text x="26" y="22" font-size="10.5" font-weight="700" fill="#ffffff" font-family="system-ui" letter-spacing="0.04em">TEAM LEAD B</text>
          <text x="100" y="55" font-size="13" font-weight="600" fill="#1e3a5f" font-family="system-ui" text-anchor="middle">Aisha Mbeki</text>
