<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excalidraw Style — System Architecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1b26;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Caveat', cursive;
      overflow: hidden;
    }

    .page-title {
      color: #c0caf5;
      font-family: 'Caveat', cursive;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 20px;
      opacity: 0.7;
      text-transform: lowercase;
    }

    .canvas-card {
      background: #fffef8;
      border-radius: 16px;
      box-shadow:
        0 2px 6px rgba(0,0,0,0.08),
        0 8px 30px rgba(0,0,0,0.25),
        0 30px 80px rgba(0,0,0,0.4);
      padding: 40px 48px 44px;
      position: relative;
      /* subtle paper texture via repeating gradient */
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 27px,
          rgba(180,180,210,0.07) 28px
        );
    }

    .diagram-title {
      font-family: 'Caveat', cursive;
      font-size: 28px;
      font-weight: 700;
      color: #2d2d3a;
      text-align: center;
      margin-bottom: 28px;
      letter-spacing: 0.5px;
    }

    .diagram-subtitle {
      font-family: 'Patrick Hand', sans-serif;
      font-size: 13px;
      color: #888;
      text-align: center;
      margin-top: -20px;
      margin-bottom: 28px;
    }

    svg {
      display: block;
      overflow: visible;
    }

    /* Drop shadow filter for nodes */
  </style>
</head>
<body>

  <div class="page-title">✦ excalidraw style ✦</div>

  <div class="canvas-card">
    <div class="diagram-title">System Architecture</div>
    <div class="diagram-subtitle">hand-drawn &amp; imperfect, just like us</div>

    <svg width="820" height="500" viewBox="0 0 820 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Hand-drawn roughness filter -->
        <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
          <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="2" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>
        </filter>

        <!-- Slightly heavier roughness for arrows -->
        <filter id="rough-arrow" x="-10%" y="-10%" width="120%" height="120%">
          <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" seed="7" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
        </filter>

        <!-- Subtle drop shadow for nodes -->
        <filter id="node-shadow" x="-10%" y="-10%" width="130%" height="140%">
          <feDropShadow dx="3" dy="4" stdDeviation="4" flood-color="#00000022"/>
        </filter>

        <!-- Arrow marker — sketchy triangle -->
        <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
          <path d="M 0.3 0.5 L 9.2 3.6 L 0.6 7.1 L 1.8 3.5 Z" fill="#3b82f6" stroke="#3b82f6" stroke-width="0.3"/>
        </marker>
        <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
          <path d="M 0.3 0.5 L 9.2 3.6 L 0.6 7.1 L 1.8 3.5 Z" fill="#16a34a" stroke="#16a34a" stroke-width="0.3"/>
        </marker>
        <marker id="arrow-yellow" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
          <path d="M 0.3 0.5 L 9.2 3.6 L 0.6 7.1 L 1.8 3.5 Z" fill="#b45309" stroke="#b45309" stroke-width="0.3"/>
        </marker>
        <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
          <path d="M 0.3 0.5 L 9.2 3.6 L 0.6 7.1 L 1.8 3.5 Z" fill="#be185d" stroke="#be185d" stroke-width="0.3"/>
        </marker>
        <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
          <path d="M 0.3 0.5 L 9.2 3.6 L 0.6 7.1 L 1.8 3.5 Z" fill="#475569" stroke="#475569" stroke-width="0.3"/>
        </marker>
        <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
          <path d="M 0.3 0.5 L 9.2 3.6 L 0.6 7.1 L 1.8 3.5 Z" fill="#c2410c" stroke="#c2410c" stroke-width="0.3"/>
        </marker>
        <marker id="arrow-dashed" markerWidth="10" markerHeight="10" refX="8" refY="3.5" orient="auto">
          <path d="M 0.3 0.5 L 9.2 3.6 L 0.6 7.1 L 1.8 3.5 Z" fill="#64748b" stroke="#64748b" stroke-width="0.3"/>
        </marker>

        <!-- Cross-hatch pattern for database -->
        <pattern id="hatch-gray" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="7" stroke="rgba(148,163,184,0.25)" stroke-width="1.5"/>
        </pattern>

        <!-- Cross-hatch for cache -->
        <pattern id="hatch-red" patternUnits="userSpaceOnUse" width="7" height="7" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="7" stroke="rgba(251,146,60,0.25)" stroke-width="1.5"/>
        </pattern>
      </defs>

      <!-- ══════════════════════════════════════════════════════
           BACKGROUND GRID (subtle dot grid like Excalidraw)
           ══════════════════════════════════════════════════════ -->
      <g opacity="0.35">
        <pattern id="dot-grid" patternUnits="userSpaceOnUse" width="24" height="24">
          <circle cx="12" cy="12" r="0.9" fill="#cbd5e1"/>
        </pattern>
        <rect width="820" height="500" fill="url(#dot-grid)" rx="4"/>
      </g>

      <!-- ══════════════════════════════════════════════════════
           ARROWS (drawn first so they appear behind nodes)
           ══════════════════════════════════════════════════════ -->

      <!-- Client → API Gateway (horizontal right, wobble) -->
      <path
        d="M 212 152 C 240 149, 268 154, 292 152"
        stroke="#3b82f6" stroke-width="2.2" fill="none"
        marker-end="url(#arrow-blue)"
        stroke-dasharray="none"
        filter="url(#rough-arrow)"
        opacity="0.85"
      />
      <!-- Label: REST -->
      <rect x="234" y="134" width="40" height="20" rx="4" fill="#eff6ff" opacity="0.92" filter="url(#rough)"/>
      <text x="254" y="148" font-family="'Patrick Hand', sans-serif" font-size="13" fill="#3b82f6" text-anchor="middle">REST</text>

      <!-- API Gateway → Auth Service (diagonal down-left, wobble) -->
      <path
        d="M 355 202 C 345 230, 290 255, 270 278"
        stroke="#16a34a" stroke-width="2.2" fill="none"
        marker-end="url(#arrow-green)"
        filter="url(#rough-arrow)"
        opacity="0.85"
      />
      <!-- Label: JWT check -->
      <rect x="275" y="238" width="66" height="20" rx="4" fill="#f0fdf4" opacity="0.92" filter="url(#rough)"/>
      <text x="308" y="252" font-family="'Patrick Hand', sans-serif" font-size="12" fill="#16a34a" text-anchor="middle">JWT check</text>

      <!-- API Gateway → User Service (diagonal down-right, wobble) -->
      <path
        d="M 408 202 C 418 230, 480 252, 490 278"
        stroke="#be185d" stroke-width="2.2" fill="none"
        marker-end="url(#arrow-pink)"
        filter="url(#rough-arrow)"
        opacity="0.85"
      />
      <!-- Label: route -->
      <rect x="448" y="235" width="42" height="20" rx="4" fill="#fdf2f8" opacity="0.92" filter="url(#rough)"/>
      <text x="469" y="249" font-family="'Patrick Hand', sans-serif" font-size="12" fill="#be185d" text-anchor="middle">route</text>

      <!-- User Service → Database (down) -->
      <path
        d="M 507 368 C 510 382, 556 398, 562 418"
        stroke="#475569" stroke-width="2.2" fill="none"
        marker-end="url(#arrow-gray)"
        filter="url(#rough-arrow)"
        opacity="0.85"
      />
      <!-- Label: SQL -->
      <rect x="518" y="384" width="35" height="20" rx="4" fill="#f8fafc" opacity="0.92" filter="url(#rough)"/>
      <text x="535" y="398" font-family="'Patrick Hand', sans-serif" font-size="13" fill="#475569" text-anchor="middle">SQL</text>

      <!-- User Service → Cache (right) -->
      <path
        d="M 563 322 C 600 318, 640 320, 672 322"
        stroke="#c2410c" stroke-width="2.2" fill="none"
        marker-end="url(#arrow-red)"
        filter="url(#rough-arrow)"
        opacity="0.85"
      />
      <!-- Label: Redis -->
      <rect x="601" y="304" width="42" height="20" rx="4" fill="#fff7ed" opacity="0.92" filter="url(#rough)"/>
      <text x="622" y="318" font-family="'Patrick Hand', sans-serif" font-size="13" fill="#c2410c" text-anchor="middle">Redis</text>

      <!-- Auth Service → Database (dashed — read users) -->
      <path
        d="M 252 368 C 280 395, 490 425, 540 438"
        stroke="#64748b" stroke-width="1.8" fill="none"
        stroke-dasharray="6,4"
        marker-end="url(#arrow-dashed)"
        filter="url(#rough-arrow)"
        opacity="0.7"
      />
      <!-- Label: verify -->
      <rect x="348" y="395" width="50" height="20" rx="4" fill="#f8fafc" opacity="0.9" filter="url(#rough)"/>
      <text x="373" y="409" font-family="'Patrick Hand', sans-serif" font-size="12" fill="#64748b" text-anchor="middle">verify</text>

      <!-- ══════════════════════════════════════════════════════
           NODE 1: CLIENT (blue) — top-left
           Hand-drawn rect: wobbly path
           ══════════════════════════════════════════════════════ -->
      <g filter="url(#node-shadow)">
        <!-- fill -->
        <path
          d="M 60.4 112.2 C 89.7 110.8, 150.3 111.5, 182.2 112.8 C 183.5 128.6, 182.8 164.3, 182.1 191.5 C 149.8 192.7, 87.6 191.9, 60.8 191.2 C 59.6 163.5, 60.1 127.8, 60.4 112.2 Z"
          fill="#dbeafe"
          filter="url(#rough)"
        />
        <!-- border (slightly different wobbly path for that double-stroke feel) -->
        <path
          d="M 60.4 112.2 C 89.7 110.8, 150.3 111.5, 182.2 112.8 C 183.5 128.6, 182.8 164.3, 182.1 191.5 C 149.8 192.7, 87.6 191.9, 60.8 191.2 C 59.6 163.5, 60.1 127.8, 60.4 112.2 Z"
          fill="none" stroke="#2563eb" stroke-width="2.3"
          filter="url(#rough)"
        />
      </g>
      <!-- Browser icon group -->
      <g transform="translate(95, 130)" opacity="0.9">
        <!-- Browser window shape (hand-drawn feel via filter) -->
        <rect x="0" y="0" width="52" height="36" rx="3" fill="none" stroke="#2563eb" stroke-width="1.8" filter="url(#rough)"/>
        <!-- top bar -->
        <line x1="0" y1="10" x2="52" y2="10" stroke="#2563eb" stroke-width="1.5" filter="url(#rough)"/>
        <!-- dots in top bar -->
        <circle cx="7" cy="5" r="2" fill="#2563eb" opacity="0.7"/>
        <circle cx="14" cy="5" r="2" fill="#2563eb" opacity="0.5"/>
        <circle cx="21" cy="5" r="2" fill="#2563eb" opacity="0.35"/>
        <!-- "lines" inside simulating content -->
        <line x1="5" y1="18" x2="47" y2="18" stroke="#93c5fd" stroke-width="1.5" filter="url(#rough)"/>
        <line x1="5" y1="25" x2="36" y2="25" stroke="#93c5fd" stroke-width="1.5" filter="url(#rough)"/>
      </g>
      <!-- Node label -->
      <text x="121" y="184" font-family="'Caveat', cursive" font-size="17" font-weight="700" fill="#1d4ed8" text-anchor="middle">Client</text>

      <!-- ══════════════════════════════════════════════════════
           NODE 2: API GATEWAY (green) — center-top
           ══════════════════════════════════════════════════════ -->
      <g filter="url(#node-shadow)">
        <path
          d="M 292.3 111.9 C 329.8 110.4, 410.5 111.2, 447.7 112.5 C 448.9 128.9, 448.3 165.1, 447.6 192.3 C 409.1 193.5, 327.7 192.7, 292.2 191.8 C 291.1 164.0, 291.5 127.9, 292.3 111.9 Z"
          fill="#dcfce7"
          filter="url(#rough)"
        />
        <path
          d="M 292.3 111.9 C 329.8 110.4, 410.5 111.2, 447.7 112.5 C 448.9 128.9, 448.3 165.1, 447.6 192.3 C 409.1 193.5, 327.7 192.7, 292.2 191.8 C 291.1 164.0, 291.5 127.9, 292.3 111.9 Z"
          fill="none" stroke="#16a34a" stroke-width="2.3"
          filter="url(#rough)"
        />
      </g>
      <!-- Gateway icon: shield-ish with arrows -->
      <g transform="translate(340, 127)" opacity="0.88">
        <!-- hex-ish shield -->
        <path d="M 20 0 L 38 8 L 38 26 L 20 36 L 2 26 L 2 8 Z" fill="none" stroke="#16a34a" stroke-width="1.7" filter="url(#rough)"/>
        <path d="M 20 8 L 10 20 L 20 20 L 20 29 L 30 17 L 20 17 Z" fill="#16a34a" opacity="0.4" filter="url(#rough)"/>
      </g>
      <text x="370" y="178" font-family="'Caveat', cursive" font-size="16" font-weight="700" fill="#15803d" text-anchor="middle">API Gateway</text>

      <!-- ══════════════════════════════════════════════════════
           NODE 3: AUTH SERVICE (yellow) — left-middle
           ══════════════════════════════════════════════════════ -->
      <g filter="url(#node-shadow)">
        <path
          d="M 150.5 277.8 C 179.3 276.3, 320.7 277.1, 349.4 278.4 C 350.6 294.2, 350.0 330.4, 349.3 357.6 C 319.4 358.8, 177.7 358.0, 150.8 357.3 C 149.7 329.6, 150.2 293.5, 150.5 277.8 Z"
          fill="#fef9c3"
          filter="url(#rough)"
        />
        <path
          d="M 150.5 277.8 C 179.3 276.3, 320.7 277.1, 349.4 278.4 C 350.6 294.2, 350.0 330.4, 349.3 357.6 C 319.4 358.8, 177.7 358.0, 150.8 357.3 C 149.7 329.6, 150.2 293.5, 150.5 277.8 Z"
          fill="none" stroke="#b45309" stroke-width="2.3"
          filter="url(#rough)"
        />
      </g>
      <!-- Lock icon -->
      <g transform="translate(209, 294)" opacity="0.88">
        <rect x="4" y="12" width="28" height="20" rx="3" fill="none" stroke="#b45309" stroke-width="1.7" filter="url(#rough)"/>
        <path d="M 9 12 L 9 6 C 9 1, 27 1, 27 6 L 27 12" fill="none" stroke="#b45309" stroke-width="1.7" filter="url(#rough)"/>
        <circle cx="18" cy="21" r="3" fill="#b45309" opacity="0.5"/>
        <line x1="18" y1="22" x2="18" y2="27" stroke="#b45309" stroke-width="1.7"/>
      </g>
      <text x="250" y="348" font-family="'Caveat', cursive" font-size="17" font-weight="700" fill="#92400e" text-anchor="middle">Auth Service</text>

      <!-- ══════════════════════════════════════════════════════
           NODE 4: USER SERVICE (pink) — center-right
           ══════════════════════════════════════════════════════ -->
      <g filter="url(#node-shadow)">
        <path
          d="M 430.4 278.1 C 459.2 276.6, 570.6 277.4, 599.3 278.7 C 600.5 294.5, 599.9 330.7, 599.2 357.9 C 569.3 359.1, 457.6 358.3, 430.7 357.6 C 429.6 329.9, 430.1 293.8, 430.4 278.1 Z"
          fill="#fce7f3"
          filter="url(#rough)"
        />
        <path
          d="M 430.4 278.1 C 459.2 276.6, 570.6 277.4, 599.3 278.7 C 600.5 294.5, 599.9 330.7, 599.2 357.9 C 569.3 359.1, 457.6 358.3, 430.7 357.6 C 429.6 329.9, 430.1 293.8, 430.4 278.1 Z"
          fill="none" stroke="#be185d" stroke-width="2.3"
          filter="url(#rough)"
        />
      </g>
      <!-- Person icon -->
      <g transform="translate(469, 292)" opacity="0.88">
        <circle cx="18" cy="10" r="8" fill="none" stroke="#be185d" stroke-width="1.7" filter="url(#rough)"/>
        <path d="M 2 38 C 2 26, 34 26, 34 38" fill="none" stroke="#be185d" stroke-width="1.7" filter="url(#rough)"/>
      </g>
      <text x="515" y="349" font-family="'Caveat', cursive" font-size="17" font-weight="700" fill="#9d174d" text-anchor="middle">User Service</text>

      <!-- ══════════════════════════════════════════════════════
           NODE 5: DATABASE (cylinder) — bottom-center
           ══════════════════════════════════════════════════════ -->
      <g filter="url(#node-shadow)">
        <!-- cylinder body -->
        <path
          d="M 527.5 418.2 C 527.5 418.2, 527.2 464.5, 527.8 480.3 C 527.8 480.3, 558.7 492.8, 600.1 480.7 C 600.1 480.7, 600.8 465.2, 600.5 418.8 Z"
          fill="#e2e8f0"
          filter="url(#rough)"
        />
        <!-- cylinder fill with hatch -->
        <path
          d="M 527.5 418.2 C 527.5 418.2, 527.2 464.5, 527.8 480.3 C 527.8 480.3, 558.7 492.8, 600.1 480.7 C 600.1 480.7, 600.8 465.2, 600.5 418.8 Z"
          fill="url(#hatch-gray)"
          filter="url(#rough)"
          opacity="0.8"
        />
        <!-- top ellipse cap -->
        <ellipse cx="563.8" cy="418.5" rx="36.5" ry="11" fill="#cbd5e1" stroke="#475569" stroke-width="2.2" filter="url(#rough)"/>
        <!-- body outline -->
        <path
          d="M 527.5 418.2 L 527.2 480.3 M 600.5 418.8 L 600.1 480.7"
          fill="none" stroke="#475569" stroke-width="2.2"
          filter="url(#rough)"
        />
        <!-- bottom ellipse partial -->
        <path
          d="M 527.8 480.3 Q 563.5 494, 600.1 480.7"
          fill="none" stroke="#475569" stroke-width="2.2"
          filter="url(#rough)"
        />
        <!-- middle rib lines -->
        <path d="M 528 445 Q 564 454 600 445" fill="none" stroke="#94a3b8" stroke-width="1.2" opacity="0.6" filter="url(#rough)"/>
        <path d="M 528 460 Q 564 470 600 460" fill="none" stroke="#94a3b8" stroke-width="1.2" opacity="0.6" filter="url(#rough)"/>
      </g>
      <text x="564" y="494" font-family="'Caveat', cursive" font-size="16" font-weight="700" fill="#334155" text-anchor="middle">Database</text>

      <!-- ══════════════════════════════════════════════════════
           NODE 6: CACHE (rounded rect, orange-red) — right
           ══════════════════════════════════════════════════════ -->
      <g filter="url(#node-shadow)">
        <!-- Rounded wobbly rect — cache -->
        <path
          d="M 672.3 298.6 C 685.0 296.5, 755.3 297.4, 767.8 298.9 C 769.2 308.5, 769.0 332.8, 768.3 348.1 C 754.8 349.5, 684.0 348.7, 672.7 347.9 C 671.4 333.3, 671.8 309.0, 672.3 298.6 Z"
          fill="#ffedd5"
          filter="url(#rough)"
        />
        <!-- hatch overlay -->
        <path
          d="M 672.3 298.6 C 685.0 296.5, 755.3 297.4, 767.8 298.9 C 769.2 308.5, 769.0 332.8, 768.3 348.1 C 754.8 349.5, 684.0 348.7, 672.7 347.9 C 671.4 333.3, 671.8 309.0, 672.3 298.6 Z"
          fill="url(#hatch-red)"
          filter="url(#rough)"
          opacity="0.7"
        />
        <path
          d="M 672.3 298.6 C 685.0 296.5, 755.3 297.4, 767.8 298.9 C 769.2 308.5, 769.0 332.8, 768.3 348.1 C 754.8 349.5, 684.0 348.7, 672.7 347.9 C 671.4 333.3, 671.8 309.0, 672.3 298.6 Z"
          fill="none" stroke="#c2410c" stroke-width="2.3"
          filter="url(#rough)"
        />
      </g>
      <!-- Lightning bolt icon for cache -->
      <g transform="translate(694, 308)" opacity="0.88">
        <path d="M 18 0 L 6 18 L 15 18 L 10 34 L 26 12 L 17 12 Z" fill="#c2410c" opacity="0.35" filter="url(#rough)"/>
        <path d="M 18 0 L 6 18 L 15 18 L 10 34 L 26 12 L 17 12 Z" fill="none" stroke="#c2410c" stroke-width="1.7" filter="url(#rough)"/>
      </g>
      <text x="720" y="342" font-family="'Caveat', cursive" font-size="16" font-weight="700" fill="#9a3412" text-anchor="middle">Cache</text>

      <!-- ══════════════════════════════════════════════════════
           ANNOTATION / STICKY NOTE
           ══════════════════════════════════════════════════════ -->
      <g transform="translate(34, 385)" filter="url(#rough)">
        <path d="M 0 0 L 90 0 L 90 68 L 70 88 L 0 88 Z" fill="#fef08a" opacity="0.92"/>
        <path d="M 70 68 L 90 68 L 70 88 Z" fill="#ca8a04" opacity="0.25"/>
        <path d="M 70 68 L 90 68 L 70 88 Z" fill="none" stroke="#ca8a04" stroke-width="1"/>
        <path d="M 0 0 L 90 0 L 90 68 L 70 88 L 0 88 Z" fill="none" stroke="#ca8a04" stroke-width="1.5"/>
      </g>
      <text x="46" y="411" font-family="'Patrick Hand', sans-serif" font-size="11.5" fill="#713f12">
        <tspan x="46" dy="0">all services</tspan>
        <tspan x="46" dy="16">communicate</tspan>
        <tspan x="46" dy="16">over internal</tspan>
        <tspan x="46" dy="16">network ✓</tspan>
      </text>

      <!-- ══════════════════════════════════════════════════════
           LEGEND — top right corner
           ══════════════════════════════════════════════════════ -->
      <g transform="translate(638, 110)" filter="url(#rough)">
        <rect x="0" y="0" width="160" height="115" rx="6" fill="#fffef8" stroke="#cbd5e1" stroke-width="1.5"/>
      </g>
      <text x="652" y="130" font-family="'Caveat', cursive" font-size="15" font-weight="700" fill="#334155">Legend</text>
      <!-- solid arrow -->
      <line x1="656" y1="142" x2="688" y2="142" stroke="#475569" stroke-width="2" marker-end="url(#arrow-gray)" filter="url(#rough-arrow)"/>
      <text x="696" y="147" font-family="'Patrick Hand', sans-serif" font-size="11.5" fill="#475569">sync call</text>
      <!-- dashed arrow -->
      <line x1="656" y1="164" x2="688" y2="164" stroke="#64748b" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arrow-dashed)" filter="url(#rough-arrow)"/>
