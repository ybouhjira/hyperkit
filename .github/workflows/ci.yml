name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install chromium --with-deps
      # Design-system core first: the main package's theme shims and CSS
      # imports resolve against its built dist.
      - run: pnpm --filter @ybouhjira/hyperkit-styles build
      - run: pnpm lint
      - run: npx tsc --noEmit
      - run: pnpm build
      - run: pnpm test
      - run: pnpm -r --filter '!@ybouhjira/hyperkit' build
      - run: pnpm -r --filter '!@ybouhjira/hyperkit' test
