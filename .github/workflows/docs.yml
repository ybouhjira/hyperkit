name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website-solid/**'
      - 'docs-manifest.json'
      - 'src/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile

      # The site and its playground runtime bundle HyperKit from the workspace
      # source; the lazy devtools import resolves to built dists, and pnpm does
      # not topologically order peer/dev dependencies — build explicitly.
      - name: Build library dependency chain
        run: |
          pnpm --filter @ybouhjira/hyperkit-styles build
          pnpm build
          pnpm --filter @ybouhjira/hyperkit-timeline build
          pnpm --filter @ybouhjira/hyperkit-devtools build
          # Architecture Studio demo consumes the diagram engine (browser-only
          # dist, gitignored). Build core -> svg -> solid before the site.
          pnpm --filter @ybouhjira/diagram-core build
          pnpm --filter @ybouhjira/diagram-svg build
          pnpm --filter @ybouhjira/diagram-solid build

      - name: Build site (generate + playground runtime + prerender)
        working-directory: website-solid
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website-solid/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
