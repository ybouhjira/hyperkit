name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs-manifest.json'
      - 'src/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The playground runtime bundles HyperKit from the workspace source,
      # so the root workspace must be installed and built first.
      - name: Install workspace
        run: pnpm install --frozen-lockfile

      # The runtime lazy-imports hyperkit-devtools, which resolves to its
      # built dist. hyperkit is a peer/dev dependency of timeline and devtools,
      # so pnpm's topological ordering doesn't cover it — build explicitly.
      - name: Build playground dependencies
        run: |
          pnpm build
          pnpm --filter @ybouhjira/hyperkit-timeline build
          pnpm --filter @ybouhjira/hyperkit-devtools build

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Regenerate component pages
        working-directory: website
        run: npm run generate

      - name: Build site
        working-directory: website
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
